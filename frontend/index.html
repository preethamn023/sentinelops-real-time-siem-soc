<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelOPS - Real-time SOC SIEM</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg-main: #050d1a;
            --bg-panel: #0d1f36;
            --border-color: #1a3a5c;
            --accent: #00d4ff;
            --success: #00ff9d;
            --alert: #ff4757;
            --warning: #ffa502;
            --purple: #a855f7;
            --text-body: #c9e4ff;
            --text-muted: #7badc8;
            --text-faint: #3d6e8f;
            --header-border: #0f2540;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-body);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
        }
        
        .mono { font-family: 'Share Tech Mono', monospace; }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Layout */
        header {
            background-color: #030811;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .hex-icon {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: var(--accent);
            stroke-width: 2;
        }

        .brand-title {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
        }

        .brand-title span {
            color: var(--accent);
        }

        .tagline {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: -2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-indicators {
            display: flex;
            gap: 15px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .dot-green { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
        .dot-red { background: var(--alert); box-shadow: 0 0 8px var(--alert); animation: pulseFast 1s infinite; }
        .dot-yellow { background: var(--warning); box-shadow: 0 0 8px var(--warning); animation: pulse 3s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        
        @keyframes pulseFast {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        .live-clock {
            font-size: 16px;
            color: var(--accent);
            padding-left: 15px;
            border-left: 1px solid var(--border-color);
        }

        /* Navigation */
        nav {
            display: flex;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            padding: 0 20px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            border-bottom: 2px solid transparent;
        }

        .nav-btn:hover { color: var(--text-body); }
        .nav-btn.active {
            color: #ffffff;
            border-bottom: 2px solid var(--accent);
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 12px 15px;
            border-bottom: 1px solid var(--header-border);
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.5px;
            font-size: 14px;
        }

        .panel-content {
            padding: 15px;
            flex: 1;
        }

        /* Dashboard Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            text-align: center;
        }

        .metric-label {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 36px;
            font-weight: normal;
        }

        .metric-sub {
            font-size: 11px;
            color: var(--text-faint);
            margin-top: 5px;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 10px;
            color: var(--text-faint);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid rgba(26, 58, 92, 0.4);
            font-size: 14px;
        }

        tr:hover td {
            background: rgba(0, 212, 255, 0.03);
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 700;
            color: #000;
        }

        .badge-CRIT { background: var(--alert); color: #fff;}
        .badge-HIGH { background: var(--warning); }
        .badge-MED { background: var(--accent); }
        .badge-LOW { background: var(--success); }
        
        /* Analytics Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 400px;
            margin-bottom: 20px;
        }
        
        .chart-container {
            position: relative;
            height: 100%;
            width: 100%;
        }
        
        canvas {
            background-color: transparent !important;
        }

        /* Threat Intel Tab Filters */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        .filter-label {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
        }

        select {
            background: #061121;
            border: 1px solid var(--border-color);
            color: var(--text-body);
            padding: 6px 10px;
            border-radius: 4px;
            font-family: inherit;
            outline: none;
        }

        .threat-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }

        .threat-bar-fill {
            height: 100%;
        }

        /* Switches */
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 18px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1a3a5c;
            transition: .2s;
            border-radius: 18px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Incident Progress Bar */
        .progress-steps {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            margin: 20px 0;
            padding: 0 10px;
        }
        
        .progress-line {
            position: absolute;
            top: 50%;
            left: 10px;
            right: 10px;
            height: 2px;
            background: var(--border-color);
            z-index: 1;
        }

        .step {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .step-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--bg-panel);
            border: 2px solid var(--border-color);
        }

        .step.filled .step-dot { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .step.active .step-dot { background: var(--warning); border-color: var(--warning); animation: pulseFast 1s infinite; }
        
        .step-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        .step.filled .step-label { color: var(--accent); }
        .step.active .step-label { color: var(--warning); }

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const BASE_URL = 'http://localhost:5000';

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isOnline, setIsOnline] = useState(true);
            const [localTime, setLocalTime] = useState('');
            const [trigger, setTrigger] = useState(0);

            // Data storage using refs
            const eventsRef = useRef([]);
            const statsRef = useRef({ total_24h: 0, critical: 0, threats_blocked: 0, attackers: 0 });
            const attackersRef = useRef([]);
            const hourlyRef = useRef(Array(24).fill(0));
            const allUniqueRulesRef = useRef(new Set());

            // Chart Refs
            const lineChartRef = useRef(null);
            const barChartRef = useRef(null);
            const lineCanvasRef = useRef(null);
            const barCanvasRef = useRef(null);

            // Tab 3 State
            const [filterType, setFilterType] = useState('All');
            const [filterStatus, setFilterStatus] = useState('All');

            // Tab 4 State
            const [rulesState, setRulesState] = useState({
                "SSH_BRUTE_FORCE": true,
                "NMAP_SCAN_DETECT": true,
                "SQLI_PATTERN": true,
                "PRIV_ESCALATION": true,
                "MALWARE_HASH": true,
                "DNS_EXFIL": true,
                "CRED_STUFF": true,
                "FW_CHANGE": true,
            });

            // Clock Initialization
            useEffect(() => {
                const tick = () => {
                    const now = new Date();
                    setLocalTime(now.toLocaleTimeString('en-US', { hour12: false }) + '.' + Math.floor(now.getMilliseconds()/100) + ' / UTC ' + now.getUTCHours().toString().padStart(2,'0') + ':' + now.getUTCMinutes().toString().padStart(2,'0'));
                };
                tick();
                const timer = setInterval(tick, 1000);
                return () => clearInterval(timer);
            }, []);

            // Charts Initialization
            useEffect(() => {
                const lineCtx = lineCanvasRef.current.getContext('2d');
                lineChartRef.current = new Chart(lineCtx, {
                    type: 'line',
                    data: {
                        labels: Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`),
                        datasets: [{
                            label: 'Events per hour',
                            data: Array(24).fill(0),
                            borderColor: 'rgba(0, 212, 255, 0.8)',
                            backgroundColor: 'rgba(0, 212, 255, 0.15)',
                            fill: true,
                            tension: 0.3,
                            pointRadius: 2,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        backgroundColor: 'transparent',
                        scales: {
                            x: { grid: { color: 'rgba(0,212,255,0.08)' }, ticks: { color: '#3d6e8f', font: {family: 'Share Tech Mono'} } },
                            y: { grid: { color: 'rgba(0,212,255,0.08)' }, ticks: { color: '#3d6e8f', font: {family: 'Share Tech Mono'} } }
                        },
                        plugins: { legend: { labels: { color: '#3d6e8f', font: {family: 'Rajdhani'} } } }
                    }
                });

                const barCtx = barCanvasRef.current.getContext('2d');
                barChartRef.current = new Chart(barCtx, {
                    type: 'bar',
                    data: {
                        labels: [],
                        datasets: [{
                            label: 'Top attack types',
                            data: [],
                            backgroundColor: ['#ff4757','#ffa502','#00d4ff','#a855f7','#00ff9d','#ff6b81','#74b9ff']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        backgroundColor: 'transparent',
                        scales: {
                            x: { grid: { color: 'rgba(0,212,255,0.08)' }, ticks: { color: '#3d6e8f' } },
                            y: { grid: { color: 'rgba(0,212,255,0.08)' }, ticks: { color: '#3d6e8f', font: {family: 'Share Tech Mono'} } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });

                return () => {
                    if (lineChartRef.current) lineChartRef.current.destroy();
                    if (barChartRef.current) barChartRef.current.destroy();
                };
            }, []);

            // Main Data Polling
            const pollAPI = useCallback(async () => {
                try {
                    const [events, stats, attackers, hourly] = await Promise.all([
                        fetch(BASE_URL + '/api/events').then(r => r.json()).catch(()=>[]),
                        fetch(BASE_URL + '/api/stats').then(r => r.json()).catch(()=>null),
                        fetch(BASE_URL + '/api/attackers').then(r => r.json()).catch(()=>[]),
                        fetch(BASE_URL + '/api/chart/hourly').then(r => r.json()).catch(()=>[])
                    ]);

                    setIsOnline(true);

                    // Update Events
                    if (Array.isArray(events) && events.length > 0) {
                        eventsRef.current = [...events, ...eventsRef.current].slice(0, 25);
                        eventsRef.current.forEach(e => {
                            if (e.rule_name) allUniqueRulesRef.current.add(e.rule_name);
                        });
                    }

                    // Update Stats
                    if (stats && typeof stats === 'object') {
                        statsRef.current = {
                            total_24h: stats.total_24h || 0,
                            critical: stats.critical || 0,
                            threats_blocked: stats.threats_blocked || 0,
                            attackers: stats.attackers || 0
                        };
                    }

                    // Update Attackers
                    if (Array.isArray(attackers)) {
                        attackersRef.current = attackers;
                    }

                    // Update Hourly Chart
                    if (Array.isArray(hourly) && hourly.length === 24) {
                        hourlyRef.current = hourly;
                        if (lineChartRef.current) {
                            lineChartRef.current.data.datasets[0].data = hourlyRef.current;
                            lineChartRef.current.update('none');
                        }
                    }

                    // Update Top Attacks Bar Chart
                    if (eventsRef.current.length > 0 && barChartRef.current) {
                        const counts = {};
                        eventsRef.current.forEach(e => {
                            if (e.rule_name) counts[e.rule_name] = (counts[e.rule_name] || 0) + 1;
                        });
                        const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 7);
                        barChartRef.current.data.labels = sorted.map(x => x[0]);
                        barChartRef.current.data.datasets[0].data = sorted.map(x => x[1]);
                        barChartRef.current.update('none');
                    }

                    // Trigger render manually
                    setTrigger(prev => prev + 1);

                } catch (e) {
                    setIsOnline(false);
                }
            }, []);

            useEffect(() => {
                pollAPI();
                const interval = setInterval(pollAPI, 5000);
                return () => clearInterval(interval);
            }, [pollAPI]);

            // Derived Data
            const eventsToRender = eventsRef.current.slice(0, 20);
            const severityColor = (sev) => {
                if(sev === 'CRIT') return 'var(--alert)';
                if(sev === 'HIGH') return 'var(--warning)';
                if(sev === 'MED') return 'var(--accent)';
                if(sev === 'LOW') return 'var(--success)';
                return 'var(--text-muted)';
            }
            
            // Tab 3 Logic
            let maxHits = 0;
            attackersRef.current.forEach(a => { if (a.count > maxHits) maxHits = a.count; });
            const filteredAttackers = attackersRef.current.filter(a => {
                if (filterType !== 'All' && a.attack_type !== filterType) return false;
                if (filterStatus !== 'All') {
                    const score = maxHits > 0 ? (a.count / maxHits) * 100 : 0;
                    if (filterStatus === 'High Risk' && score <= 70) return false;
                    if (filterStatus === 'Medium Risk' && (score <= 30 || score > 70)) return false;
                    if (filterStatus === 'Low Risk' && score > 30) return false;
                }
                return true;
            });

            const uniqueRuleList = Array.from(allUniqueRulesRef.current).sort();

            const ruleStaticData = [
                { id: "SSH_BRUTE_FORCE", name: "SSH Brute Force", desc: "Detects multiple failed SSH login attempts", file: "local_rules.xml", acts: "BLOCK+ALERT" },
                { id: "NMAP_SCAN_DETECT", name: "Nmap Reconnaissance", desc: "Detects active port scanning behavior", file: "local_rules.xml", acts: "LOG+EMAIL" },
                { id: "SQLI_PATTERN", name: "SQL Injection", desc: "Common SQL injection payload in URI", file: "local_rules.xml", acts: "LOG+TELEGRAM" },
                { id: "PRIV_ESCALATION", name: "Privilege Escalation", desc: "Unauthorized su/sudo usage", file: "local_rules.xml", acts: "LOG" },
                { id: "MALWARE_HASH", name: "Known Malware Hash", desc: "Syscheck detected malicious file signature", file: "local_rules.xml", acts: "ISOLATE+ALERT" },
                { id: "DNS_EXFIL", name: "DNS Exfiltration", desc: "Abnormal DNS query frequency/size", file: "local_rules.xml", acts: "LOG" },
                { id: "CRED_STUFF", name: "Credential Stuffing", desc: "Distributed failed logins across accounts", file: "local_rules.xml", acts: "BLOCK" },
                { id: "FW_CHANGE", name: "Firewall Modification", desc: "Iptables/UFW changes by non-admin", file: "local_rules.xml", acts: "LOG" }
            ];

            return (
                <div className="app-container">
                    <header>
                        <div className="header-left">
                            <svg className="hex-icon" viewBox="0 0 100 100">
                                <polygon points="50 5, 90 25, 90 75, 50 95, 10 75, 10 25" />
                                <polygon points="50 20, 75 35, 75 65, 50 80, 25 65, 25 35" style={{strokeOpacity: 0.5}}/>
                                <line x1="50" y1="5" x2="50" y2="20" />
                                <line x1="50" y1="80" x2="50" y2="95" />
                            </svg>
                            <div>
                                <div className="brand-title">SENTINEL<span>OPS</span></div>
                                <div className="tagline mono">SECURITY OPERATIONS CENTER v2.4</div>
                            </div>
                        </div>
                        <div className="header-right">
                            <div className="status-indicators">
                                <div><span className={`status-dot ${isOnline ? 'dot-green' : 'dot-red'}`}></span> {isOnline ? 'SIEM ONLINE' : 'SIEM OFFLINE'}</div>
                                <div><span className="status-dot dot-red"></span> ACTIVE THREATS</div>
                                <div><span className="status-dot dot-yellow"></span> WAZUH AGENT</div>
                            </div>
                            <div className="live-clock mono">{localTime}</div>
                        </div>
                    </header>

                    <nav>
                        <button className={`nav-btn ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>Dashboard</button>
                        <button className={`nav-btn ${activeTab === 'analytics' ? 'active' : ''}`} onClick={() => setActiveTab('analytics')}>Analytics</button>
                        <button className={`nav-btn ${activeTab === 'intel' ? 'active' : ''}`} onClick={() => setActiveTab('intel')}>Threat Intel</button>
                        <button className={`nav-btn ${activeTab === 'rules' ? 'active' : ''}`} onClick={() => setActiveTab('rules')}>Alert Rules</button>
                        <button className={`nav-btn ${activeTab === 'incident' ? 'active' : ''}`} onClick={() => setActiveTab('incident')}>Incident Response</button>
                    </nav>

                    <main>
                        {/* TAB 1: Dashboard */}
                        <div style={{display: activeTab === 'dashboard' ? 'block' : 'none'}}>
                            <div className="metrics-grid">
                                <div className="metric-card">
                                    <div className="metric-label" style={{color: 'var(--accent)'}}>Total Events</div>
                                    <div className="metric-value mono" style={{color: 'var(--accent)'}}>{statsRef.current.total_24h.toLocaleString()}</div>
                                    <div className="metric-sub">Past 24 Hours</div>
                                </div>
                                <div className="metric-card">
                                    <div className="metric-label" style={{color: 'var(--alert)'}}>Critical Alerts</div>
                                    <div className="metric-value mono" style={{color: 'var(--alert)'}}>{statsRef.current.critical.toLocaleString()}</div>
                                    <div className="metric-sub">High Severity</div>
                                </div>
                                <div className="metric-card">
                                    <div className="metric-label" style={{color: 'var(--success)'}}>Threats Blocked</div>
                                    <div className="metric-value mono" style={{color: 'var(--success)'}}>{statsRef.current.threats_blocked.toLocaleString()}</div>
                                    <div className="metric-sub">Active Defense</div>
                                </div>
                                <div className="metric-card">
                                    <div className="metric-label" style={{color: 'var(--warning)'}}>Active IPs</div>
                                    <div className="metric-value mono" style={{color: 'var(--warning)'}}>{statsRef.current.attackers.toLocaleString()}</div>
                                    <div className="metric-sub">Tracked Sources</div>
                                </div>
                            </div>

                            <div className="panel">
                                <div className="panel-header">Live Event Feed</div>
                                <div className="panel-content">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Severity</th>
                                                <th>Message</th>
                                                <th>Source IP</th>
                                                <th>Rule Name</th>
                                                <th>Timestamp</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {eventsToRender.map((ev, i) => (
                                                <tr key={i}>
                                                    <td><span className={`badge badge-${ev.severity || 'LOW'}`}>{ev.severity || 'LOW'}</span></td>
                                                    <td>{ev.message || '-'}</td>
                                                    <td className="mono" style={{color: 'var(--accent)'}}>{ev.ip || '-'}</td>
                                                    <td>{ev.rule_name || '-'}</td>
                                                    <td className="mono" style={{color: 'var(--text-muted)'}}>{ev.timestamp || '-'}</td>
                                                </tr>
                                            ))}
                                            {eventsToRender.length === 0 && <tr><td colSpan="5" style={{textAlign: 'center', color: 'var(--text-faint)'}}>No events available</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* TAB 2: Analytics */}
                        <div style={{display: activeTab === 'analytics' ? 'block' : 'none'}}>
                            <div className="charts-grid">
                                <div className="panel">
                                    <div className="panel-header">Events Per Hour</div>
                                    <div className="panel-content">
                                        <div className="chart-container">
                                            <canvas ref={lineCanvasRef}></canvas>
                                        </div>
                                    </div>
                                </div>
                                <div className="panel">
                                    <div className="panel-header">Top Attack Types</div>
                                    <div className="panel-content">
                                        <div className="chart-container">
                                            <canvas ref={barCanvasRef}></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* TAB 3: Threat Intel */}
                        <div style={{display: activeTab === 'intel' ? 'block' : 'none'}}>
                            <div className="panel">
                                <div className="panel-header">Known Attackers Database</div>
                                <div className="panel-content">
                                    <div className="filter-bar">
                                        <span className="filter-label">Attack Type:</span>
                                        <select value={filterType} onChange={(e) => setFilterType(e.target.value)}>
                                            <option value="All">All Types</option>
                                            {uniqueRuleList.map(r => <option key={r} value={r}>{r}</option>)}
                                        </select>
                                        <span className="filter-label" style={{marginLeft: '20px'}}>Status:</span>
                                        <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}>
                                            <option value="All">All</option>
                                            <option value="High Risk">High Risk</option>
                                            <option value="Medium Risk">Medium Risk</option>
                                            <option value="Low Risk">Low Risk</option>
                                        </select>
                                    </div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>IP Address</th>
                                                <th>Hit Count</th>
                                                <th>Last Seen</th>
                                                <th>Attack Type</th>
                                                <th style={{width: '150px'}}>Threat Score</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filteredAttackers.map((a, i) => {
                                                const score = maxHits > 0 ? (a.count / maxHits) * 100 : 0;
                                                const barColor = score > 70 ? 'var(--alert)' : (score > 30 ? 'var(--warning)' : 'var(--success)');
                                                return (
                                                    <tr key={i}>
                                                        <td className="mono" style={{color: 'var(--accent)'}}>{a.ip}</td>
                                                        <td className="mono">{a.count}</td>
                                                        <td className="mono">{a.last_seen}</td>
                                                        <td>{a.attack_type}</td>
                                                        <td>
                                                            <div className="threat-bar-container">
                                                                <div className="threat-bar-fill" style={{width: `${Math.min(100, Math.max(0, score))}%`, backgroundColor: barColor}}></div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {filteredAttackers.length === 0 && <tr><td colSpan="5" style={{textAlign: 'center', color: 'var(--text-faint)'}}>No attacker data available</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* TAB 4: Alert Rules */}
                        <div style={{display: activeTab === 'rules' ? 'block' : 'none'}}>
                            <div className="panel">
                                <div className="panel-header">Active Detection Rules</div>
                                <div className="panel-content">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Rule ID</th>
                                                <th>Rule Name</th>
                                                <th>Description</th>
                                                <th>OSSEC File</th>
                                                <th>Trigger Count</th>
                                                <th>Action</th>
                                                <th>State</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {ruleStaticData.map((rule, idx) => {
                                                const count = 412 + Math.floor((1 - idx/8) * 10500); // realistic hardcoded scaling
                                                return (
                                                <tr key={rule.id}>
                                                    <td className="mono">{rule.id}</td>
                                                    <td style={{color: 'white'}}>{rule.name}</td>
                                                    <td style={{color: 'var(--text-muted)'}}>{rule.desc}</td>
                                                    <td className="mono">{rule.file}</td>
                                                    <td className="mono">{count.toLocaleString()}</td>
                                                    <td>
                                                        <span className="badge" style={{background: 'rgba(255,255,255,0.1)', color: 'var(--text-body)'}}>
                                                            {rule.acts}
                                                        </span>
                                                    </td>
                                                    <td>
                                                        <label className="switch">
                                                            <input type="checkbox" checked={rulesState[rule.id]} onChange={() => {
                                                                setRulesState(prev => ({...prev, [rule.id]: !prev[rule.id]}));
                                                            }} />
                                                            <span className="slider"></span>
                                                        </label>
                                                    </td>
                                                </tr>
                                            )})}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* TAB 5: Incident Response */}
                        <div style={{display: activeTab === 'incident' ? 'block' : 'none'}}>
                            {[
                                { id: "IR-2025-001", title: "SSH Brute Force Campaign", techId: "T1110.001", tech: "Brute Force", status: "RESOLVED", sev: "CRIT", host: "app01-prod", desc: "Automated IP blocks issued and lateral movement verified clear. Accounts secure." },
                                { id: "IR-2025-002", title: "Nmap Reconnaissance", techId: "T1046", tech: "Network Service Discovery", status: "CONTAINED", sev: "MED", host: "ext-router-edge", desc: "Source IPs added to ACL null-route. Monitoring for subsequent exploit attempts." },
                                { id: "IR-2025-003", title: "SQL Injection Attempt", techId: "T1190", tech: "Exploit Public-Facing Application", status: "INVESTIGATING", sev: "HIGH", host: "web-portal-db", desc: "WAF caught suspicious payloads in URI. Gathering logs to determine payload efficacy." }
                            ].map((inc, i) => (
                                <div className="panel" key={i}>
                                    <div className="panel-header" style={{display: 'flex', justifyContent: 'space-between'}}>
                                        <span>{inc.id} - {inc.title}</span>
                                        <span className={`badge badge-${inc.sev}`}>{inc.sev} / {inc.status}</span>
                                    </div>
                                    <div className="panel-content">
                                        <div style={{display: 'flex', gap: '20px', marginBottom: '15px'}}>
                                            <div><strong style={{color: 'var(--text-muted)'}}>Target Host:</strong> <span className="mono" style={{color: 'var(--accent)'}}>{inc.host}</span></div>
                                            <div><strong style={{color: 'var(--text-muted)'}}>MITRE ATT&CK:</strong> <span className="badge" style={{background: 'rgba(168, 85, 247, 0.2)', color: 'var(--purple)'}}>{inc.techId}</span> {inc.tech}</div>
                                        </div>
                                        
                                        <div className="progress-steps">
                                            <div className="progress-line"></div>
                                            {['Detected', 'Investigated', 'Contained', 'Resolved'].map((step, idx) => {
                                                let state = "pending";
                                                const sMap = { 'DETECTING': 0, 'INVESTIGATING': 1, 'CONTAINED': 2, 'RESOLVED': 3 };
                                                const currentIdx = sMap[inc.status] || 0;
                                                if (idx < currentIdx) state = "filled";
                                                if (idx === currentIdx) state = "active";
                                                if (inc.status === 'RESOLVED' && idx === 3) state = "filled";

                                                return (
                                                    <div className={`step ${state}`} key={idx}>
                                                        <div className="step-dot"></div>
                                                        <div className="step-label">{step}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        
                                        <div style={{background: '#0a1628', padding: '10px 15px', borderRadius: '4px', borderLeft: '3px solid var(--border-color)'}}>
                                            <strong style={{color: 'var(--text-muted)', fontSize: '12px'}}>ACTION LOG:</strong> <br/>
                                            <span style={{fontSize: '14px'}}>{inc.desc}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
